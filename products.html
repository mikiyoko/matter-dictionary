<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matter認証製品データベース — Matter辞書</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f14; --surface: #16181f; --surface2: #1e2029;
  --border: #2a2d38; --accent: #7ee8a2; --accent2: #5bc4f5;
  --accent3: #f5a623; --text: #e8eaf0; --muted: #9da3b8; --dim: #8b90a8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; min-height: 100vh; }

/* ─── Header ─── */
header {
  border-bottom: 1px solid var(--border); padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(14,15,20,0.97); position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
.logo-badge { font-family: 'Space Mono', monospace; font-size: 11px; background: var(--accent); color: #0e0f14; padding: 3px 8px; border-radius: 3px; font-weight: 700; }
.logo-title { font-size: 16px; font-weight: 700; }
.logo-sub { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-stat { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
.back-btn {
  padding: 6px 13px; border-radius: 7px; font-size: 12px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; text-decoration: none;
  font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.back-btn:hover { background: var(--surface2); color: var(--accent); border-color: var(--accent); }
.lang-toggle {
  display: flex; align-items: center; border: 1px solid var(--border);
  border-radius: 7px; overflow: hidden; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
}
.lang-toggle button { padding: 5px 10px; border: none; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.15s; }
.lang-toggle button.active { background: var(--accent); color: #0e0f14; }
.lang-toggle button:hover:not(.active) { color: var(--text); }

/* ─── Search ─── */
.search-bar {
  padding: 14px 28px; border-bottom: 1px solid var(--border);
  background: var(--surface); display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; padding: 9px 12px 9px 36px;
  color: var(--text); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent2); }
.transport-filter { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.jpfilter {
  font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface); color: var(--muted);
  font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
}
.jpfilter.active { background: rgba(126,232,162,0.15); color: #7ee8a2; border-color: rgba(126,232,162,0.5); font-weight: 700; }
.jpfilter:hover:not(.active) { border-color: var(--accent2); color: var(--accent2); }
.tfilter {
  padding: 5px 11px; border-radius: 20px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap; font-family: 'Noto Sans JP', sans-serif;
}
.tfilter.active { background: var(--accent); color: #0e0f14; border-color: var(--accent); font-weight: 700; }
.tfilter:hover:not(.active) { border-color: var(--accent2); color: var(--accent2); }

/* ─── Layout ─── */
.layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 120px); }
.sidebar {
  border-right: 1px solid var(--border); padding: 12px 0;
  background: var(--surface); overflow-y: auto; position: sticky; top: 61px; height: calc(100vh - 61px);
}
.sidebar-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--dim); padding: 10px 18px 5px; font-family: 'Space Mono', monospace;
}
.cat-btn {
  display: flex; align-items: center; gap: 9px; width: 100%; padding: 8px 18px;
  border: none; background: transparent; color: var(--muted); cursor: pointer;
  text-align: left; font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
  border-left: 2px solid transparent; transition: all 0.15s; white-space: nowrap; overflow: hidden;
}
.cat-btn:hover { background: var(--surface2); color: var(--text); }
.cat-btn.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }
.cat-icon { font-size: 15px; flex-shrink: 0; }
.cat-label { flex: 1; }
.cat-count { font-size: 10px; font-family: 'Space Mono', monospace; background: var(--bg); padding: 1px 6px; border-radius: 3px; color: var(--dim); flex-shrink: 0; }
.sidebar-sep { height: 1px; background: var(--border); margin: 8px 0; }

/* ─── Main ─── */
.main { padding: 22px 28px; overflow-y: auto; }
.sec-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.sec-title { font-size: 18px; font-weight: 700; }
.sec-count { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }

/* ─── Product Grid ─── */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.product-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; cursor: pointer; transition: all 0.18s;
  display: flex; flex-direction: column; gap: 10px;
}
.product-card:hover { border-color: var(--accent2); background: var(--surface2); transform: translateY(-1px); }

.card-maker { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.japan-badge {
  font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
  font-family: 'Space Mono', monospace; line-height: 1.4;
}
.japan-badge-active   { background: rgba(126,232,162,0.15); color: #7ee8a2; border: 1px solid rgba(126,232,162,0.35); }
.japan-badge-inactive { background: rgba(80,80,100,0.2);    color: #888;   border: 1px solid rgba(120,120,140,0.3); }
.maker-badge {
  font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px; color: #0e0f14;
}
.card-name-ja { font-size: 14px; font-weight: 700; line-height: 1.4; }
.card-name-en { font-size: 11px; color: var(--muted); line-height: 1.3; margin-top: 2px; }

.transport-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.ttag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 700; font-family: 'Space Mono', monospace; }
.ttag-thread { background: rgba(91,196,245,0.15); color: var(--accent2); border: 1px solid rgba(91,196,245,0.3); }
.ttag-wifi   { background: rgba(245,166,35,0.12); color: var(--accent3); border: 1px solid rgba(245,166,35,0.3); }
.ttag-eth    { background: rgba(126,232,162,0.1);  color: var(--accent);  border: 1px solid rgba(126,232,162,0.2); }
.ttag-ble    { background: rgba(155,100,255,0.12); color: #b388ff; border: 1px solid rgba(155,100,255,0.25); }

.card-devtype { font-size: 12px; color: var(--muted); }
.card-devtype-name { color: var(--text); font-weight: 500; }

.card-links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
.plink {
  font-size: 11px; padding: 4px 10px; border-radius: 6px; text-decoration: none;
  border: 1px solid var(--border); color: var(--muted);
  transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif;
}
.plink:hover { border-color: var(--accent2); color: var(--accent2); }
.plink-amazon:hover  { border-color: #f5a623; color: #f5a623; }
.plink-rakuten:hover { border-color: #e83929; color: #e83929; }
.plink-official:hover { border-color: var(--accent); color: var(--accent); }
.plink-csa:hover { border-color: var(--accent2); color: var(--accent2); }

/* ─── Modal ─── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.72); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  width: 100%; max-width: 680px; max-height: 88vh; overflow-y: auto;
  animation: slideUp 0.22s ease;
}
@keyframes slideUp { from { opacity:0; transform: translateY(18px); } to { opacity:1; transform: translateY(0); } }
.modal-close-row {
  display: flex; justify-content: flex-end; padding: 14px 18px 0;
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.close-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.close-btn:hover { color: var(--text); }
.modal-body { padding: 6px 26px 28px; }

.modal-product-head { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
.modal-maker-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.modal-name-ja { font-size: 20px; font-weight: 700; line-height: 1.35; margin-bottom: 3px; }
.modal-name-en { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.modal-maker-label { font-size: 12px; color: var(--dim); font-family: 'Space Mono', monospace; }

.modal-section { margin-bottom: 18px; }
.modal-section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); font-family: 'Space Mono', monospace;
  margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border);
}

/* Device type rows */
.dt-rows { display: flex; flex-direction: column; gap: 6px; }
.dt-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--surface2); border-radius: 7px;
  border: 1px solid var(--border); transition: border-color 0.15s;
}
.dt-row-link { cursor: pointer; }
.dt-row-link:hover { border-color: var(--accent); }
.dt-row-icon { font-size: 20px; flex-shrink: 0; }
.dt-row-name { font-size: 13px; font-weight: 700; }
.dt-row-en { font-size: 11px; color: var(--dim); }
.dt-row-id { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent2); margin-left: auto; flex-shrink: 0; }
.dt-row-arrow { font-size: 11px; color: var(--dim); flex-shrink: 0; transition: color 0.15s; }
.dt-row-link:hover .dt-row-arrow { color: var(--accent); }

/* Cluster chips */
.cluster-section-grid { display: flex; flex-direction: column; gap: 5px; }
.cluster-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; background: var(--surface2); border-radius: 6px;
  border: 1px solid var(--border); transition: border-color 0.15s; cursor: pointer;
}
.cluster-item:hover { border-color: var(--accent2); }
.cluster-arrow { font-size: 11px; color: var(--dim); flex-shrink: 0; transition: color 0.15s; }
.cluster-item:hover .cluster-arrow { color: var(--accent2); }
.cluster-abbr {
  font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
  background: rgba(91,196,245,0.12); color: var(--accent2); border: 1px solid rgba(91,196,245,0.25);
  min-width: 36px; text-align: center;
}
.cluster-name { font-size: 12px; font-weight: 600; flex: 1; }
.cluster-role { font-size: 10px; color: var(--dim); font-family: 'Space Mono', monospace; }
.cluster-cat { font-size: 10px; padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border); color: var(--dim); font-family: 'Space Mono', monospace; }

/* CSA cert section */
.csa-block {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
}
.csa-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.csa-label { color: var(--dim); font-family: 'Space Mono', monospace; font-size: 10px; min-width: 80px; }
.csa-value { color: var(--text); }
.csa-link {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 6px; font-size: 12px; text-decoration: none;
  border: 1px solid rgba(91,196,245,0.35); color: var(--accent2);
  transition: all 0.15s; margin-top: 4px; align-self: flex-start;
}
.csa-link:hover { background: rgba(91,196,245,0.1); border-color: var(--accent2); }

/* Purchase links */
.modal-links { display: flex; gap: 7px; flex-wrap: wrap; }
.modal-plink {
  padding: 6px 14px; border-radius: 7px; font-size: 12px; text-decoration: none;
  border: 1px solid var(--border); color: var(--muted); transition: all 0.15s;
}
.modal-plink:hover { border-color: var(--accent2); color: var(--accent2); }
.modal-plink-amazon:hover  { border-color: #f5a623; color: #f5a623; }
.modal-plink-rakuten:hover { border-color: #e83929; color: #e83929; }
.modal-plink-official:hover { border-color: var(--accent); color: var(--accent); }

/* Loading / Empty */
.loading-state { text-align: center; padding: 80px 20px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 13px; }
.loading-spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; grid-column: 1/-1; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 14px; }
  .sidebar-label { display: none; }
  .sidebar-sep { display: none; }
  .cat-btn { width: auto; padding: 5px 10px; border-radius: 20px; border-left: none; font-size: 12px; }
  .cat-btn.active { border: 1px solid var(--accent); border-left: 1px solid var(--accent); }
}
@media (max-width: 600px) {
  header { padding: 12px 16px; }
  .main { padding: 16px; }
  .search-bar { padding: 12px 16px; }
  .product-grid { grid-template-columns: 1fr; }
  .logo-sub { display: none; }
  .header-stat { display: none; }
}

.site-footer { border-top: 1px solid var(--border); padding: 40px 28px; text-align: center; font-size: 13px; color: var(--muted); }
.footer-inner { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 4px 14px; }
.footer-sep { color: var(--border); }
.footer-inner a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
.footer-inner a:hover { color: var(--accent); }
@media (max-width: 600px) {
  .site-footer { padding: 32px 16px; }
  .footer-inner { flex-direction: column; gap: 10px; }
  .footer-sep { display: none; }
}
</style>

<body>

<header>
  <a class="logo" href="index.html">
    <span class="logo-badge">Matter 1.5</span>
    <div>
      <div class="logo-title" id="logoTitle">⚡ Matter辞書</div>
      <div class="logo-sub">by ライフテックコーディネーター 織田未来</div>
    </div>
  </a>
  <div class="header-right">
    <span class="header-stat" id="headerStat"></span>
    <a href="index.html" class="back-btn">← <span id="backBtnLabel">辞書トップ</span></a>
    <div class="lang-toggle">
      <button id="btnJa" class="active" onclick="setLang('ja')">JA</button>
      <button id="btnEn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="製品名・メーカー名で検索…">
  </div>
  <div class="transport-filter" id="transportFilter">
    <button class="tfilter active" data-t="all">すべて</button>
    <button class="tfilter" data-t="Thread">Thread</button>
    <button class="tfilter" data-t="Wi-Fi">Wi-Fi</button>
    <button class="tfilter" data-t="Ethernet">Ethernet</button>
    <div class="filter-sep"></div>
    <button class="jpfilter" id="jpFilterBtn" data-jp="active">🇯🇵 JP取扱あり</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="sec-header">
      <span class="sec-title" id="secTitle">製品データベース</span>
      <span class="sec-count" id="secCount"></span>
    </div>
    <div id="productGrid" class="product-grid">
      <div class="loading-state"><div class="loading-spinner"></div>製品データを読み込み中…</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-close-row">
      <button class="close-btn" id="closeBtn">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────
var PRODUCTS_API_URL = 'https://smart-home-recipe.vercel.app/api/products';

var CATEGORIES = [
  {id:'all',        label:'すべての製品',         labelEn:'All Products',      icon:'🏠'},
  {id:'lighting',   label:'照明',                 labelEn:'Lighting',          icon:'💡'},
  {id:'plug',       label:'スマートプラグ',        labelEn:'Smart Plugs',       icon:'🔌'},
  {id:'switch',     label:'スイッチ',             labelEn:'Switches',          icon:'🎚'},
  {id:'sensor',     label:'センサー',             labelEn:'Sensors',           icon:'📡'},
  {id:'entry',      label:'玄関・扉・窓',          labelEn:'Doors & Windows',   icon:'🚪'},
  {id:'hvac',       label:'HVAC（空調）',          labelEn:'HVAC',              icon:'🌡'},
  {id:'appliances', label:'家電',                 labelEn:'Appliances',        icon:'🍳'},
  {id:'energy',     label:'エネルギー',           labelEn:'Energy',            icon:'⚡'},
  {id:'camera',     label:'カメラ・セキュリティ',  labelEn:'Cameras',           icon:'📷'},
  {id:'media',      label:'メディア',             labelEn:'Media',             icon:'📺'},
  {id:'robot',      label:'ロボット',             labelEn:'Robots',            icon:'🤖'},
  {id:'utility',    label:'ユーティリティ',        labelEn:'Utility',           icon:'🔧'},
];

var MAKER_COLORS = {
  'Aqara':'#7ee8a2','SwitchBot':'#5bc4f5','TP-Link':'#f5a623','IKEA':'#ffdb3e',
  'Philips Hue':'#e040fb','Nanoleaf':'#69f0ae','Govee':'#ff6e6e','Meross':'#40c4ff',
};
function makerColor(m) { return MAKER_COLORS[m] || '#9da3b8'; }

// ─── State ───────────────────────────────────────────────────
var ALL_PRODUCTS = [];
var DEVICE_TYPE_MAP = {};   // deviceTypeId (e.g. "0x0100") → dt object
var currentLang      = localStorage.getItem('matter-dict-lang') || 'ja';
var currentCat        = 'all';
var currentTransport  = 'all';
var currentMaker      = 'all';
var currentDeviceType  = 'all';   // ?deviceType= パラメータで絞り込み（index.htmlからの遷移用）
var currentJapanStatus = 'all';   // 'all' | 'active' | 'inactive'
var searchQuery        = '';

// デバイスタイプ絞り込みを解除（グローバルスコープ: onclickから呼ばれる）
function clearDeviceTypeFilter() {
  currentDeviceType = 'all';
  var banner = document.getElementById('dt-filter-banner');
  if (banner) banner.remove();
  renderProducts();
  syncUrl();
}

// すべての絞り込みを解除
function clearAllFilters() {
  currentMaker        = 'all';
  currentCat          = 'all';
  currentTransport    = 'all';
  currentDeviceType   = 'all';
  currentJapanStatus  = 'all';
  searchQuery         = '';
  var jpBtn = document.getElementById('jpFilterBtn');
  if (jpBtn) jpBtn.classList.remove('active');
  var searchInput = document.getElementById('searchInput');
  if (searchInput) searchInput.value = '';
  // transport ボタンの active を "すべて" に戻す
  document.querySelectorAll('.tfilter').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-t') === 'all');
  });
  // deviceType バナーを削除
  var banner = document.getElementById('dt-filter-banner');
  if (banner) banner.remove();
  // サイドバーの active を更新（buildSidebar 後なら refreshSidebarActive で OK）
  if (typeof refreshSidebarActive === 'function') refreshSidebarActive();
  renderProducts();
  syncUrl();
}

// フィルター状態をURLに同期（ブックマーク・シェア対応）
function syncUrl() {
  var params = new URLSearchParams();
  if (currentDeviceType !== 'all') params.set('deviceType', currentDeviceType);
  if (currentMaker !== 'all')      params.set('maker', currentMaker);
  if (currentCat    !== 'all')     params.set('cat', currentCat);
  if (currentTransport    !== 'all') params.set('t', currentTransport);
  if (currentJapanStatus  !== 'all') params.set('jp', currentJapanStatus);
  if (searchQuery)                   params.set('q', searchQuery);
  var qs = params.toString();
  window.history.replaceState({}, '', window.location.pathname + (qs ? '?' + qs : ''));
}

// ─── Helpers ─────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function tTag(t) {
  var c = t === 'Thread' ? 'ttag-thread' : t === 'Wi-Fi' || t === 'WiFi' ? 'ttag-wifi' : t === 'Ethernet' ? 'ttag-eth' : 'ttag-ble';
  return '<span class="ttag ' + c + '">' + esc(t) + '</span>';
}
function getProductCategory(p) {
  var ids = p.allDeviceTypeIds && p.allDeviceTypeIds.length ? p.allDeviceTypeIds : [p.primaryDeviceTypeId];
  for (var i = 0; i < ids.length; i++) {
    var dt = DEVICE_TYPE_MAP[ids[i]];
    if (dt && dt.category) return dt.category;
  }
  return 'utility';
}

// ─── Filter ──────────────────────────────────────────────────
function getFiltered() {
  var q = searchQuery.toLowerCase();
  return ALL_PRODUCTS.filter(function(p) {
    if (currentTransport !== 'all') {
      var tr = p.transport || [];
      if (!tr.some(function(x){ return x === currentTransport || (currentTransport === 'Wi-Fi' && x === 'WiFi'); })) return false;
    }
    if (currentMaker !== 'all' && p.maker !== currentMaker) return false;
    if (currentCat !== 'all' && getProductCategory(p) !== currentCat) return false;
    if (currentDeviceType !== 'all') {
      var dtIds = p.allDeviceTypeIds && p.allDeviceTypeIds.length ? p.allDeviceTypeIds : [p.primaryDeviceTypeId];
      if (dtIds.indexOf(currentDeviceType) < 0) return false;
    }
    if (currentJapanStatus !== 'all' && (p.japanStatus || 'unknown') !== currentJapanStatus) return false;
    if (q) {
      var hay = [p.nameJa||'', p.nameEn||'', p.maker||''].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// ─── Active filter bar ───────────────────────────────────────
function updateActiveFilterBar() {
  var bar = document.getElementById('activeFilterBar');
  var isActive = currentMaker !== 'all' || currentCat !== 'all'
    || currentTransport !== 'all' || searchQuery !== ''
    || currentDeviceType !== 'all' || currentJapanStatus !== 'all';

  if (!isActive) {
    if (bar) bar.remove();
    return;
  }

  // タグ生成
  var tags = [];
  if (currentDeviceType !== 'all') {
    var dtObj = DEVICE_TYPE_MAP[currentDeviceType];
    var dtName = dtObj ? (currentLang === 'ja' ? (dtObj.nameJa || dtObj.name) : dtObj.name) : currentDeviceType;
    tags.push(dtName + ' <span style="font-family:\'Space Mono\',monospace;font-size:10px;opacity:.6">' + esc(currentDeviceType) + '</span>');
  }
  if (currentMaker      !== 'all') tags.push(esc(currentMaker));
  if (currentCat        !== 'all') {
    var catObj = (typeof CATEGORIES !== 'undefined') && CATEGORIES.find(function(c){ return c.id === currentCat; });
    tags.push(catObj ? esc(catObj.label) : esc(currentCat));
  }
  if (currentTransport  !== 'all') tags.push(esc(currentTransport));
  if (currentJapanStatus === 'active')   tags.push('🇯🇵 JP取扱あり');
  if (currentJapanStatus === 'inactive') tags.push('JP取扱なし');
  if (searchQuery)                  tags.push('「' + esc(searchQuery) + '」');

  var tagsHtml = tags.map(function(t) {
    return '<span style="background:var(--accent2);color:#0e0f14;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">' + t + '</span>';
  }).join('');

  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'activeFilterBar';
    bar.style.cssText = 'display:flex;align-items:center;flex-wrap:wrap;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;';
    var grid = document.getElementById('productGrid');
    grid.parentNode.insertBefore(bar, grid);
  }
  bar.innerHTML = '<span style="color:var(--dim)">絞り込み中:</span>'
    + tagsHtml
    + '<button onclick="clearAllFilters()" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer;font-size:11px;padding:3px 10px;white-space:nowrap;">✕ 解除</button>';
}

// ─── Render cards ────────────────────────────────────────────
function renderProducts() {
  var list = getFiltered();
  var grid = document.getElementById('productGrid');
  var countEl = document.getElementById('secCount');
  countEl.textContent = list.length + (currentLang === 'en' ? ' products' : ' 件');
  updateActiveFilterBar();

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty-state">該当する製品が見つかりません</div>';
    return;
  }

  grid.innerHTML = list.map(function(p, idx) {
    var realIdx = ALL_PRODUCTS.indexOf(p);
    var nameJa = p.nameJa || p.nameEn || '';
    var nameEn = p.nameEn || '';
    var displayName = currentLang === 'en' ? (nameEn || nameJa) : (nameJa || nameEn);
    var subName     = currentLang === 'en' ? '' : nameEn;

    var dtIds = p.allDeviceTypeIds && p.allDeviceTypeIds.length ? p.allDeviceTypeIds : [p.primaryDeviceTypeId];
    var dtNames = dtIds.slice(0,2).map(function(id) {
      var dt = DEVICE_TYPE_MAP[id];
      if (!dt) return id;
      return (currentLang === 'en' ? dt.name : (dt.nameJa || dt.name));
    }).join(' / ');

    var transHtml = (p.transport || []).map(tTag).join('');
    var col = makerColor(p.maker);

    // Japan status badge
    var jpBadge = '';
    if (p.japanStatus === 'active') {
      jpBadge = '<span class="japan-badge japan-badge-active">🇯🇵 JP取扱あり</span>';
    } else if (p.japanStatus === 'inactive') {
      jpBadge = '<span class="japan-badge japan-badge-inactive">JP取扱なし</span>';
    }

    // Purchase links + CSA link on card
    var linksHtml = '';
    if (p.purchaseLinks && p.purchaseLinks.amazon)   linksHtml += '<a class="plink plink-amazon" href="' + esc(p.purchaseLinks.amazon) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">Amazon</a>';
    if (p.purchaseLinks && p.purchaseLinks.rakuten)  linksHtml += '<a class="plink plink-rakuten" href="' + esc(p.purchaseLinks.rakuten) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">楽天</a>';
    if (p.purchaseLinks && p.purchaseLinks.official) linksHtml += '<a class="plink plink-official" href="' + esc(p.purchaseLinks.official) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">公式</a>';
    if (p.csa && p.csa.pageUrl) linksHtml += '<a class="plink plink-csa" href="' + esc(p.csa.pageUrl) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">CSA</a>';

    return '<div class="product-card" data-idx="' + realIdx + '">'
      + '<div class="card-maker"><span class="maker-badge" style="background:' + col + '">' + esc(p.maker || '?') + '</span>' + jpBadge + '</div>'
      + '<div><div class="card-name-ja">' + esc(displayName) + '</div>'
      + (subName ? '<div class="card-name-en">' + esc(subName) + '</div>' : '')
      + '</div>'
      + (transHtml ? '<div class="transport-tags">' + transHtml + '</div>' : '')
      + '<div class="card-devtype"><span class="card-devtype-name">' + esc(dtNames) + '</span></div>'
      + (linksHtml ? '<div class="card-links">' + linksHtml + '</div>' : '')
      + '</div>';
  }).join('');

  grid.querySelectorAll('.product-card').forEach(function(card) {
    card.addEventListener('click', function() {
      openProductModal(parseInt(card.getAttribute('data-idx')));
    });
  });
}

// ─── Modal ───────────────────────────────────────────────────
function openProductModal(idx) {
  var p = ALL_PRODUCTS[idx];
  if (!p) return;

  var col = makerColor(p.maker);
  var nameJa = p.nameJa || p.nameEn || '';
  var nameEn = p.nameEn || '';

  // Transport
  var transHtml = (p.transport || []).map(tTag).join('');

  // Device types section
  var dtIds = p.allDeviceTypeIds && p.allDeviceTypeIds.length ? p.allDeviceTypeIds : [p.primaryDeviceTypeId];
  var dtRowsHtml = dtIds.map(function(id) {
    var dt = DEVICE_TYPE_MAP[id];
    var icon = dt ? dt.icon : '📦';
    var nameJ = dt ? (dt.nameJa || dt.name) : id;
    var nameE = dt ? dt.name : id;
    // 0x なし形式("0015")を "0x0015" に正規化してリンクを生成
    var normId = id.toLowerCase().indexOf('0x') === 0 ? id : '0x' + id;
    return '<a class="dt-row dt-row-link" href="index.html?dt=' + esc(normId) + '" target="_blank" rel="noopener" style="text-decoration:none;color:inherit">'
      + '<span class="dt-row-icon">' + icon + '</span>'
      + '<div style="flex:1"><div class="dt-row-name">' + esc(nameJ) + '</div>'
      + (nameJ !== nameE ? '<div class="dt-row-en">' + esc(nameE) + '</div>' : '')
      + '</div>'
      + '<span class="dt-row-id">' + esc(id) + '</span>'
      + '<span class="dt-row-arrow">↗</span>'
      + '</a>';
  }).join('');

  // Clusters section
  var clusters = p.supportedClusters || [];
  var clusterHtml = '';
  if (clusters.length > 0) {
    var grouped = {};
    clusters.forEach(function(c) {
      var cat = c.category || 'other';
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(c);
    });
    function renderClusterGroup(list) {
      return list.map(function(c) {
        return '<a class="cluster-item" href="index.html?cluster=' + esc(c.id) + '" target="_blank" rel="noopener" style="text-decoration:none;color:inherit">'
          + '<span class="cluster-abbr">' + esc(c.picsAbbr || c.id.slice(0,4).toUpperCase()) + '</span>'
          + '<span class="cluster-name">' + esc(c.name) + '</span>'
          + '<span class="cluster-role">' + esc(c.role || '') + '</span>'
          + '<span class="cluster-arrow">↗</span>'
          + '</a>';
      }).join('');
    }
    var catOrder = ['application', 'utility', 'system', 'other'];
    catOrder.concat(Object.keys(grouped).filter(function(k){ return catOrder.indexOf(k) < 0; }))
      .forEach(function(cat) {
        if (!grouped[cat]) return;
        clusterHtml += '<div style="margin-bottom:8px">'
          + '<div style="font-size:10px;color:var(--dim);font-family:\'Space Mono\',monospace;margin-bottom:4px;text-transform:uppercase;">' + esc(cat) + '</div>'
          + '<div class="cluster-section-grid">' + renderClusterGroup(grouped[cat]) + '</div></div>';
      });
  }

  // CSA section
  var csaHtml = '';
  if (p.csa) {
    csaHtml = '<div class="csa-block">'
      + (p.csa.certificateId ? '<div class="csa-row"><span class="csa-label">Certificate</span><span class="csa-value">' + esc(p.csa.certificateId) + '</span></div>' : '')
      + (p.csa.certifiedAt   ? '<div class="csa-row"><span class="csa-label">Certified</span><span class="csa-value">' + esc(p.csa.certifiedAt) + '</span></div>' : '')
      + (p.csa.matterVersion ? '<div class="csa-row"><span class="csa-label">Matter</span><span class="csa-value">v' + esc(p.csa.matterVersion) + '</span></div>' : '')
      + (p.csa.pageUrl ? '<a class="csa-link" href="' + esc(p.csa.pageUrl) + '" target="_blank" rel="noopener">↗ CSA認証ページを開く</a>' : '')
      + '</div>';
  }

  // Purchase links
  var purchaseHtml = '';
  if (p.purchaseLinks) {
    if (p.purchaseLinks.amazon)   purchaseHtml += '<a class="modal-plink modal-plink-amazon"  href="' + esc(p.purchaseLinks.amazon)   + '" target="_blank" rel="noopener">Amazon</a>';
    if (p.purchaseLinks.rakuten)  purchaseHtml += '<a class="modal-plink modal-plink-rakuten" href="' + esc(p.purchaseLinks.rakuten)  + '" target="_blank" rel="noopener">楽天市場</a>';
    if (p.purchaseLinks.official) purchaseHtml += '<a class="modal-plink modal-plink-official" href="' + esc(p.purchaseLinks.official) + '" target="_blank" rel="noopener">公式サイト</a>';
  }

  var html = ''
    + '<div class="modal-product-head">'
    +   '<div class="modal-maker-dot" style="background:' + col + '"></div>'
    +   '<div>'
    +     '<div class="modal-name-ja">' + esc(nameJa) + '</div>'
    +     (nameEn && nameEn !== nameJa ? '<div class="modal-name-en">' + esc(nameEn) + '</div>' : '')
    +     '<div class="modal-maker-label">' + esc(p.maker || '') + (p.makerVendorId ? ' · Vendor ' + esc(p.makerVendorId) : '') + '</div>'
    +     (p.japanStatus === 'active'   ? '<span class="japan-badge japan-badge-active" style="margin-top:4px;display:inline-block">🇯🇵 JP取扱あり</span>' :
           p.japanStatus === 'inactive' ? '<span class="japan-badge japan-badge-inactive" style="margin-top:4px;display:inline-block">JP取扱なし</span>' : '')
    +   '</div>'
    + '</div>'
    + (transHtml ? '<div class="transport-tags" style="margin-bottom:16px">' + transHtml + '</div>' : '')
    // Device types
    + '<div class="modal-section">'
    +   '<div class="modal-section-title">' + (currentLang === 'en' ? 'Device Types' : 'デバイスタイプ') + '</div>'
    +   '<div class="dt-rows">' + dtRowsHtml + '</div>'
    + '</div>'
    // Clusters
    + (clusters.length > 0
      ? '<div class="modal-section">'
      +   '<div class="modal-section-title">' + (currentLang === 'en' ? 'Supported Clusters (' + clusters.length + ')' : 'サポートクラスター（' + clusters.length + '件）') + '</div>'
      +   clusterHtml
      + '</div>'
      : '')
    // CSA
    + (csaHtml ? '<div class="modal-section"><div class="modal-section-title">CSA 認証情報</div>' + csaHtml + '</div>' : '')
    // Purchase
    + (purchaseHtml ? '<div class="modal-section"><div class="modal-section-title">' + (currentLang === 'en' ? 'Purchase' : '購入リンク') + '</div><div class="modal-links">' + purchaseHtml + '</div></div>' : '');

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  if (window.location.search) {
    window.history.replaceState({}, '', window.location.pathname);
  }
}

// ─── Sidebar ─────────────────────────────────────────────────
function buildSidebar() {
  var sidebar = document.getElementById('sidebar');

  // Product category counts
  function catCount(catId, makerFilter) {
    return ALL_PRODUCTS.filter(function(p) {
      if (makerFilter !== 'all' && p.maker !== makerFilter) return false;
      return catId === 'all' || getProductCategory(p) === catId;
    }).length;
  }

  // Maker counts
  var makerCounts = {};
  ALL_PRODUCTS.forEach(function(p) {
    var m = p.maker || 'Other';
    makerCounts[m] = (makerCounts[m] || 0) + 1;
  });
  var makers = Object.keys(makerCounts).sort(function(a,b){ return makerCounts[b] - makerCounts[a]; });

  var html = '';

  // Category section
  html += '<div class="sidebar-label" id="sidebarCatLabel">カテゴリ</div>';
  CATEGORIES.forEach(function(cat) {
    var cnt = catCount(cat.id, 'all');
    if (cnt === 0 && cat.id !== 'all') return;
    var isActive = currentCat === cat.id && currentMaker === 'all';
    html += '<button class="cat-btn' + (isActive ? ' active' : '') + '" data-cat="' + cat.id + '">'
      + '<span class="cat-icon">' + cat.icon + '</span>'
      + '<span class="cat-label">' + (currentLang === 'en' ? cat.labelEn : cat.label) + '</span>'
      + '<span class="cat-count">' + cnt + '</span>'
      + '</button>';
  });

  html += '<div class="sidebar-sep"></div>';

  // Maker section
  html += '<div class="sidebar-label" id="sidebarMakerLabel">メーカー</div>';
  makers.forEach(function(m) {
    var col = makerColor(m);
    html += '<button class="cat-btn maker-btn' + (currentMaker === m ? ' active' : '') + '" data-maker="' + esc(m) + '">'
      + '<span class="cat-icon"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + col + '"></span></span>'
      + '<span class="cat-label">' + esc(m) + '</span>'
      + '<span class="cat-count">' + makerCounts[m] + '</span>'
      + '</button>';
  });

  sidebar.innerHTML = html;

  // Bind events
  sidebar.querySelectorAll('.cat-btn[data-cat]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentCat = btn.getAttribute('data-cat');
      currentMaker = 'all';
      refreshSidebarActive();
      renderProducts();
      syncUrl();
    });
  });
  sidebar.querySelectorAll('.cat-btn.maker-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentMaker = btn.getAttribute('data-maker');
      currentCat = 'all';
      refreshSidebarActive();
      renderProducts();
      syncUrl();
    });
  });
}

function refreshSidebarActive() {
  document.querySelectorAll('.cat-btn[data-cat]').forEach(function(btn) {
    btn.classList.toggle('active', currentMaker === 'all' && btn.getAttribute('data-cat') === currentCat);
  });
  document.querySelectorAll('.cat-btn.maker-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-maker') === currentMaker);
  });
}

// ─── Transport filter ─────────────────────────────────────────
document.querySelectorAll('.tfilter').forEach(function(btn) {
  btn.addEventListener('click', function() {
    currentTransport = btn.getAttribute('data-t');
    document.querySelectorAll('.tfilter').forEach(function(b){ b.classList.toggle('active', b === btn); });
    renderProducts();
    syncUrl();
  });
});

// ─── Japan status filter ──────────────────────────────────────
document.getElementById('jpFilterBtn').addEventListener('click', function() {
  if (currentJapanStatus === 'active') {
    currentJapanStatus = 'all';
    this.classList.remove('active');
  } else {
    currentJapanStatus = 'active';
    this.classList.add('active');
  }
  renderProducts();
  syncUrl();
});

// ─── Search ───────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  renderProducts();
  syncUrl();
});

// ─── Modal close ─────────────────────────────────────────────
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

// ─── Language ────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('matter-dict-lang', lang);
  document.getElementById('btnJa').classList.toggle('active', lang === 'ja');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  applyLangUI(lang);
  buildSidebar();
  renderProducts();
}

function applyLangUI(lang) {
  var el;
  el = document.getElementById('logoTitle');
  if (el) el.textContent = lang === 'en' ? '⚡ Matter Dictionary' : '⚡ Matter辞書';
  el = document.getElementById('backBtnLabel');
  if (el) el.textContent = lang === 'en' ? 'Dictionary' : '辞書トップ';
  el = document.getElementById('searchInput');
  if (el) el.placeholder = lang === 'en' ? 'Search by product name or maker…' : '製品名・メーカー名で検索…';
  var tLabels = {all: lang==='en'?'All':'すべて', Thread:'Thread', 'Wi-Fi':'Wi-Fi', Ethernet:'Ethernet'};
  document.querySelectorAll('.tfilter').forEach(function(b){ var k = b.getAttribute('data-t'); if(tLabels[k]) b.textContent = tLabels[k]; });
  var footerAbout = document.getElementById('footer-about-link');
  var footerLicense = document.getElementById('footer-license-link');
  if (footerAbout) footerAbout.textContent = lang === 'en' ? 'About' : 'このサイトについて';
  if (footerLicense) footerLicense.textContent = lang === 'en' ? 'License & Source' : 'ライセンス・出典';
}

// ─── Init ─────────────────────────────────────────────────────
Promise.all([
  fetch(PRODUCTS_API_URL).then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
  fetch('data/deviceTypes.json').then(function(r){ return r.json(); }).catch(function(){ return []; })
]).then(function(results) {
  var products   = results[0];
  var deviceTypes = results[1];

  deviceTypes.forEach(function(dt) {
    var id = dt.deviceTypeId;
    DEVICE_TYPE_MAP[id] = dt;
    // "0x0015" → "0015" など、0x なし形式でもヒットするよう両方登録
    var noPrefix = id.replace(/^0x/i, '');
    if (noPrefix !== id) DEVICE_TYPE_MAP[noPrefix] = dt;
  });

  ALL_PRODUCTS = products;

  var statEl = document.getElementById('headerStat');
  if (statEl) statEl.textContent = products.length + (currentLang === 'en' ? ' products' : ' 製品');

  // URLパラメータ → state変数に先に反映してから描画する
  (function() {
    var params = new URLSearchParams(window.location.search);

    // フィルター状態を復元
    var makerParam = params.get('maker');
    var catParam   = params.get('cat');
    var tParam     = params.get('t');
    var qParam     = params.get('q');
    var dtParam    = params.get('deviceType');

    var jpParam   = params.get('jp');

    if (makerParam)  currentMaker        = makerParam;
    if (catParam)    currentCat          = catParam;
    if (tParam)      currentTransport    = tParam;
    if (jpParam)     currentJapanStatus  = jpParam;
    if (qParam)      { searchQuery = qParam; document.getElementById('searchInput').value = qParam; }
    if (dtParam)     currentDeviceType   = dtParam;
  })();

  applyLangUI(currentLang);
  buildSidebar();

  // transport ボタンの active 状態を URL から復元
  document.querySelectorAll('.tfilter').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-t') === currentTransport);
  });

  // Japan filter ボタンの active 状態を URL から復元
  var jpBtn = document.getElementById('jpFilterBtn');
  if (jpBtn) jpBtn.classList.toggle('active', currentJapanStatus === 'active');

  renderProducts();

  // ?product={id} で特定製品のモーダルを自動オープン
  (function() {
    var params = new URLSearchParams(window.location.search);
    var openId = params.get('product');
    if (!openId) return;
    var idx = -1;
    for (var i = 0; i < ALL_PRODUCTS.length; i++) {
      if (ALL_PRODUCTS[i].id === openId || ALL_PRODUCTS[i].slug === openId) { idx = i; break; }
    }
    if (idx >= 0) setTimeout(function(){ openProductModal(idx); }, 80);
  })();


}).catch(function(err) {
  console.error('製品データ読み込みエラー:', err);
  document.getElementById('productGrid').innerHTML =
    '<div class="empty-state">'
    + '<div style="font-size:28px;margin-bottom:12px">⚠️</div>'

    + '</div>';
});
